<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Left ear -->
  <circle cx="28" cy="28" r="18" fill="#1a1a1a"/>
  <circle cx="28" cy="28" r="10" fill="#3a3a3a"/>
  <!-- Right ear -->
  <circle cx="92" cy="28" r="18" fill="#1a1a1a"/>
  <circle cx="92" cy="28" r="10" fill="#3a3a3a"/>

  <!-- Head -->
  <circle cx="60" cy="64" r="48" fill="white"/>
  <circle cx="60" cy="64" r="48" fill="white" stroke="#e5e5e5" stroke-width="1"/>

  <!-- Left eye patch -->
  <ellipse cx="42" cy="54" rx="14" ry="13" fill="#1a1a1a"/>
  <!-- Right eye patch -->
  <ellipse cx="78" cy="54" rx="14" ry="13" fill="#1a1a1a"/>

  <!-- Left eye white -->
  <circle cx="42" cy="54" r="7" fill="white"/>
  <!-- Right eye white -->
  <circle cx="78" cy="54" r="7" fill="white"/>

  <!-- Left pupil -->
  <circle cx="43" cy="55" r="4" fill="#1a1a1a"/>
  <!-- Right pupil -->
  <circle cx="79" cy="55" r="4" fill="#1a1a1a"/>

  <!-- Left eye shine -->
  <circle cx="45" cy="53" r="1.5" fill="white"/>
  <!-- Right eye shine -->
  <circle cx="81" cy="53" r="1.5" fill="white"/>

  <!-- Nose -->
  <ellipse cx="60" cy="71" rx="5" ry="3.5" fill="#1a1a1a"/>

  <!-- Mouth -->
  <path d="M54 77 Q60 84 66 77" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" fill="none"/>

  <!-- Left blush -->
  <ellipse cx="32" cy="76" rx="9" ry="6" fill="#fca5a5" opacity="0.6"/>
  <!-- Right blush -->
  <ellipse cx="88" cy="76" rx="9" ry="6" fill="#fca5a5" opacity="0.6"/>

  <!-- Little paws at the bottom, holding/squishing something -->
  <!-- Left paw -->
  <ellipse cx="40" cy="108" rx="12" ry="8" fill="#1a1a1a"/>
  <circle cx="33" cy="104" r="4" fill="#1a1a1a"/>
  <circle cx="40" cy="102" r="4" fill="#1a1a1a"/>
  <circle cx="47" cy="104" r="4" fill="#1a1a1a"/>

  <!-- Right paw -->
  <ellipse cx="80" cy="108" rx="12" ry="8" fill="#1a1a1a"/>
  <circle cx="73" cy="104" r="4" fill="#1a1a1a"/>
  <circle cx="80" cy="102" r="4" fill="#1a1a1a"/>
  <circle cx="87" cy="104" r="4" fill="#1a1a1a"/>

  <!-- Squished image block between paws -->
  <rect x="48" y="105" width="24" height="10" rx="3" fill="#16a34a" opacity="0.85"/>
  <rect x="51" y="107" width="18" height="6" rx="2" fill="#4ade80" opacity="0.6"/>
</svg>
