<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Left ear -->
  <circle cx="7" cy="7" r="5" fill="#1a1a1a"/>
  <!-- Right ear -->
  <circle cx="25" cy="7" r="5" fill="#1a1a1a"/>

  <!-- Head -->
  <circle cx="16" cy="18" r="13" fill="white"/>

  <!-- Left eye patch -->
  <ellipse cx="11" cy="14" rx="4.5" ry="4" fill="#1a1a1a"/>
  <!-- Right eye patch -->
  <ellipse cx="21" cy="14" rx="4.5" ry="4" fill="#1a1a1a"/>

  <!-- Left eye white -->
  <circle cx="11" cy="14" r="2.2" fill="white"/>
  <!-- Right eye white -->
  <circle cx="21" cy="14" r="2.2" fill="white"/>

  <!-- Left pupil -->
  <circle cx="11.5" cy="14.5" r="1.3" fill="#1a1a1a"/>
  <!-- Right pupil -->
  <circle cx="21.5" cy="14.5" r="1.3" fill="#1a1a1a"/>

  <!-- Nose -->
  <ellipse cx="16" cy="19.5" rx="2" ry="1.5" fill="#1a1a1a"/>

  <!-- Mouth -->
  <path d="M13.5 22 Q16 25 18.5 22" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round" fill="none"/>

  <!-- Blush left -->
  <ellipse cx="8" cy="21" rx="3" ry="2" fill="#fca5a5" opacity="0.6"/>
  <!-- Blush right -->
  <ellipse cx="24" cy="21" rx="3" ry="2" fill="#fca5a5" opacity="0.6"/>
</svg>
